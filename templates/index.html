<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações básicas da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Título da aba do navegador -->
    <title>Transcrição YouTube</title>

    <!-- Estilos da aplicação -->
    <style>
        /* Estilo geral da página */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }
        
        /* Container centralizado com estilo de cartão */
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* Estilo do título principal */
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Estilo dos rótulos e campos de entrada */
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* Estilo para o campo de entrada quando em foco */
        input[type="text"]:focus {
            border-color: #007BFF;
            outline: none;
        }
        
        /* Estilo dos botões */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        
        /* Estilo dos botões quando hover */
        button:hover {
            background-color: #0056b3;
        }

        /* Estilo do formulário e da caixa de texto da transcrição */
        form {
            margin-top: 20px;
        }
        
        /* Estilo da caixa de texto da transcrição */
        .caixa-texto {
            white-space: pre-wrap;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 15px;
            width: 100%;
            background-color: #fafafa;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
            
        /* Estilo para os botões de ação */
        .botoes {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Remove margens dos formulários dentro da classe .botoes para melhor alinhamento */
        .botoes form {
            margin: 0;
        }
        
        /* Estilo para a imagem do thumbnail */
        img {
            display: block;
            margin: 15px auto;
            max-width: 100%;
            border-radius: 8px;
        }
        
        /* Estilo para mensagens de status (loading e copiado) */
        #loading {
            color: #007BFF;
            margin-left: 10px;
            display: none;
        }
        
        /* Estilo para mensagem de texto copiado */
        #copiado-msg {
            color: green;
            margin-left: 10px;
            display: none;
        }
    </style>
</head>

<body>

<!-- Container principal da aplicação -->
<div class="container">

    <!-- Título principal da aplicação -->
    <h1>Transcritor de Vídeos do YouTube</h1>

    <!-- FORM PRINCIPAL -->
    <form method="POST" onsubmit="mostrarLoading()">
        <label for="url">URL do Vídeo:</label><br><br>

        <input type="text" id="url" name="url" 
               value="{{ url or '' }}"  
               required 
               placeholder="Cole a URL do vídeo aqui">

        <br><br>

        <!-- Botão para enviar o formulário e obter a transcrição -->
        <button type="submit" id="btn-submit">Obter Transcrição</button>
        <span id="loading">Processando...</span>
    </form>

    <!-- Título do vídeo -->
    {% if titulo %}
        <h2 style="text-align:center;">{{ titulo }}</h2>
    {% endif %}

    <!-- Thumbnail do vídeo, com fallback para imagem genérica -->
    {% if thumbnail %}
        <img 
            src="{{ thumbnail[0] }}"
            onerror="this.onerror=null; this.src='{{ thumbnail[1] }}';"
            alt="Thumbnail do vídeo">
    {% endif %}

    <!-- Exibe a transcrição se estiver disponível -->
    {% if transcricao %}

        <h3 style="margin-top:20px;">Transcrição:</h3>

        <!-- FORM DOWNLOAD -->
        <form method="POST">

            <!-- IMPORTANTE: agora envia título -->
            <input type="hidden" name="url" value="{{ url }}">
            <input type="hidden" name="titulo" value="{{ titulo }}">

            <!-- textarea sem identação extra -->
            <textarea name="texto" class="caixa-texto" rows="20" readonly>{{ transcricao | e }}</textarea>

            <!-- Botões para baixar em TXT, DOCX e copiar para área de transferência -->
            <div class="botoes">
                <button type="submit" formaction="/download_txt">Baixar TXT</button>
                <button type="submit" formaction="/download_docx">Baixar Word (.docx)</button>
                
                <button type="button" onclick="copiarTexto()">
                    Copiar Texto
                </button>

                <span id="copiado-msg">Copiado!</span>
            </div>

        </form>

        <!-- RESET -->
        <div class="botoes" style="margin-top:25px;">
            <form method="GET" action="/">
                <button type="submit" style="background-color: #6c757d;">
                    Nova Transcrição
                </button>
            </form>

        <!-- LIMPAR HISTÓRICO -->
            <form method="POST" action="/limpar_historico"
                  onsubmit="return confirm('Tem certeza que deseja limpar o histórico? Esta ação não pode ser desfeita.');">
                <button type="submit" style="background-color: #dc3545;">
                    Limpar Histórico
                </button>
            </form>
        </div>

    {% endif %}

<!-- Exibe o histórico de transcrições anteriores, se houver -->
{% if historico %}
    <div style="margin-top:30px;">
        <h3>📜 Histórico</h3>

        <ul style="list-style: none; padding: 0;">
            {% for item in historico %}
                <li style="margin-bottom:10px;">

                    <form method="POST" style="display:inline;">
                        <input type="hidden" name="url" value="{{ item.url }}">
                        
                        <button type="submit" style="background-color:#17a2b8;">
                            {{ item.titulo }}
                        </button>
                    </form>

                </li>
            {% endfor %}
        </ul>
    </div>
{% endif %}

</div>

<!-- Scripts JavaScript para funcionalidades de copiar texto e mostrar loading -->
<script>
function copiarTexto() {
    const texto = document.querySelector('textarea[name="texto"]').value;

    navigator.clipboard.writeText(texto).then(() => {
        const msg = document.getElementById('copiado-msg');
        msg.style.display = 'inline';
        setTimeout(() => msg.style.display = 'none', 2000);
    });
}

function mostrarLoading() {
    document.getElementById('loading').style.display = 'inline';
    document.getElementById('btn-submit').disabled = true;
}
</script>

</body>
</html>
